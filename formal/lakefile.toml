name = "JensenLadder"
defaultTargets = ["JensenLadder"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "JensenLadder"
# Build the root aggregator AND every submodule (including analytic-brick
# modules outside the aggregator's import closure) so `lake build` verifies
# all source modules — matching the "128 modules" claim.
globs = ["JensenLadder.+"]
